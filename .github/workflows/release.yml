name: Build Release

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "resources/**"
      - "requirements.txt"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Read app version
        id: version
        shell: pwsh
        run: |
          $content = Get-Content src\zapret_manager_gui.py -Raw
          if ($content -match 'APP_VERSION\s*=\s*"([^"]+)"') {
            $version = $Matches[1]
          } else {
            throw "APP_VERSION not found"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Build app with PyInstaller
        run: |
          pyinstaller ^
            --onedir ^
            --windowed ^
            --uac-admin ^
            --name ZapretManager ^
            --contents-directory runtime ^
            src\zapret_manager_gui.py

      - name: Copy resources if present
        shell: pwsh
        run: |
          if (Test-Path resources) {
            New-Item -ItemType Directory -Force -Path dist\ZapretManager\resources | Out-Null
            Copy-Item resources\* dist\ZapretManager\resources\ -Recurse -Force
          }

      - name: Create portable zip
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          Compress-Archive -Path dist\ZapretManager -DestinationPath "ZapretManager_v$version.zip" -Force

      - name: Delete previous release with same tag if exists
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          gh release delete $tag --yes --cleanup-tag 2>$null
          exit 0

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "${{ steps.version.outputs.tag }}"
          gh release create $tag "ZapretManager_v$version.zip" --title "Zapret Manager v$version" --notes "Portable Windows build. Download the zip, unpack it, and run ZapretManager.exe. Python is not required."
